name: Build & attach all mod jars to release

# Runs when you publish a GitHub Release. Builds every shippable jar via
# scripts/build-all.sh (one NeoForge jar per Stonecutter node) and attaches
# them all to that release.
on:
  release:
    types: [published]

# Required so the workflow can upload jars as release assets.
permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip a leading "v" so tag v0.2.0 -> 0.2.0. Fed to Gradle so the jars (and
      # their in-jar metadata) match the release tag without bumping gradle.properties.
      - name: Derive version from release tag
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.release.tag_name }}

      # NeoForge nodes need a Java 21 launcher (Stonecutter). setup-java exports
      # JAVA_HOME_21_X64, which build-all.sh auto-detects. The 26.x nodes additionally
      # COMPILE with a Java 25 toolchain — Gradle's foojay resolver (wired in
      # settings.gradle) downloads that JDK on demand, so no setup here.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build all jars
        run: |
          chmod +x ./scripts/build-all.sh ./gradlew
          ./scripts/build-all.sh --version "${{ steps.ver.outputs.version }}"

      - name: Show built artifacts
        run: ls -la dist/

      - name: Attach jars to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.jar --clobber
