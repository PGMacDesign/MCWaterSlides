modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
logoBlur=false
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional: Patchouli powers the in-game guidebook ("Park Builder's Manual").
# The mod loads fine without it; the book only shows up when Patchouli is present.
[[dependencies.${mod_id}]]
    modId="patchouli"
    type="optional"
    versionRange="[0,)"
    ordering="NONE"
    side="BOTH"
